name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on API
        run: flake8 api/main.py --max-line-length=120

      - name: Run flake8 on worker
        run: flake8 worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install eslint
        run: npm install -g eslint@8

      - name: Create eslint config
        run: |
          cat > .eslintrc.json << 'ESLINT'
          {
            "env": { "node": true, "es2021": true },
            "extends": "eslint:recommended",
            "parserOptions": { "ecmaVersion": 2021 }
          }
          ESLINT

      - name: Run eslint on frontend
        run: eslint frontend/app.js

      - name: Install hadolint
        run: |
          wget -q -O /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          version: v0.51.1

      - name: Show API vulnerabilities
        run: |
          trivy image --severity CRITICAL --ignore-unfixed \
            --format table localhost:5000/api:latest || true

      - name: Scan API image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --ignore-unfixed --format sarif \
            --output trivy-api.sarif \
            localhost:5000/api:latest

      - name: Scan worker image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --ignore-unfixed --format sarif \
            --output trivy-worker.sarif \
            localhost:5000/worker:latest

      - name: Scan frontend image
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --ignore-unfixed --format sarif \
            --output trivy-frontend.sarif \
            localhost:5000/frontend:latest

      - name: Upload Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          REDIS_PASSWORD=integrationtestpassword
          APP_ENV=production
          FRONTEND_PORT=3000
          ENVEOF

      - name: Start full stack
        run: docker compose up --build -d

      - name: Run integration test
        run: bash integration_test.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rolling update
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              $SERVER_USER@$SERVER_HOST << 'SSHEOF'
            cd ~/hng14-stage2-devops
            git pull origin main
            docker compose pull
            for service in api worker frontend; do
              echo "Rolling update: $service"
              docker compose up -d --no-deps --build $service
              MAX_WAIT=60
              WAITED=0
              until docker compose ps $service | grep -q "healthy"; do
                if [ $WAITED -ge $MAX_WAIT ]; then
                  echo "Health check failed for $service, aborting"
                  exit 1
                fi
                sleep 5
                WAITED=$((WAITED + 5))
              done
              echo "$service is healthy"
            done
          SSHEOF
          rm -f /tmp/deploy_key
